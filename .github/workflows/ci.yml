name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: 依赖和锁文件完整性检查
  lockfile-check:
    name: Lockfile Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Verify no lockfile changes
        run: git diff --exit-code pnpm-lock.yaml || (echo "Lockfile changed after install. Run 'pnpm install' locally and commit." && exit 1)

  # Job 2: 类型检查（必须从零构建依赖）
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: lockfile-check
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-
      - name: Clean all build artifacts
        run: |
          rm -rf packages/shared-types/dist
          rm -rf apps/api/dist
          rm -rf apps/web/dist
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build workspace packages (shared-types must exist for typecheck)
        run: pnpm --filter @kok/shared-types build
      - name: Type check API
        run: pnpm --filter @kok/api typecheck
      - name: Type check Web
        run: pnpm --filter @kok/web typecheck

  # Job 3: 从零构建验证（不依赖任何缓存的 dist）
  clean-build:
    name: Clean Build Verification
    runs-on: ubuntu-latest
    needs: lockfile-check
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Clean all build artifacts
        run: |
          rm -rf packages/shared-types/dist
          rm -rf apps/api/dist
          rm -rf apps/web/dist
          find . -name "*.tsbuildinfo" -delete
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Full workspace build
        run: pnpm build
      - name: Verify build outputs exist
        run: |
          test -f packages/shared-types/dist/index.d.ts || (echo "shared-types build output missing" && exit 1)
          test -d apps/api/dist || (echo "api build output missing" && exit 1)

  # Job 4: 单元测试
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lockfile-check
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kok_cache
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build shared-types
        run: pnpm --filter @kok/shared-types build
      - name: Run tests
        run: pnpm test:run
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kok_cache

  # Job 5: Lint
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: lockfile-check
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run lint
        run: pnpm lint

  # Job 6: E2E 测试
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [typecheck, clean-build]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kok_cache
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build workspace
        run: pnpm build
      - name: Install Playwright (chromium only)
        run: cd apps/web && npx playwright install --with-deps chromium
      - name: E2E Tests
        run: cd apps/web && npx playwright test --project=chromium
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kok_cache
          FRONTEND_URL: http://localhost:5173
